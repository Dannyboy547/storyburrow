<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StoryBurrow</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #7b5cff, #b58cff, #f3d1ff);
  margin: 0;
  padding: 0;
  color: #2d1f3f;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 15px;
  padding-top: 20px;
}

.subtitle {
  text-align: center;
  color: white;
  opacity: 0.9;
  margin-bottom: 20px;
  font-size: 15px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  margin: 15px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin: 8px 0;
}

.primary-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #7b5cff, #d96fff);
  color: white;
  font-weight: bold;
  margin-top: 10px;
}

.option {
  display: inline-block;
  padding: 10px 14px;
  margin: 5px;
  border-radius: 20px;
  border: 2px solid #c9a7ff;
  cursor: pointer;
  font-size: 13px;
}

.option.active {
  background: linear-gradient(135deg, #7b5cff, #d96fff);
  color: white;
  border: none;
}

.section-title {
  margin-top: 15px;
  font-weight: bold;
}

.hidden { display: none; }

#storyText {
  white-space: pre-line;
  line-height: 1.7;
}

#storyTitle {
  font-size: 22px;
  margin-bottom: 10px;
  color: #2d1f3f;
}
</style>
</head>

<body>

<div class="container">

<div style="text-align:center;">
  <img src="Logo.png.PNG" 
  style="width:340px; max-width:92%; margin:15px 0; filter: drop-shadow(0 0 16px rgba(255,255,255,0.6));">
</div>

<p class="subtitle">Magical bedtime stories, made just for your child</p>

<div class="card">

<input id="name" placeholder="Child's Name">
<input id="companion" placeholder="Optional: Companion">

<button onclick="viewStories()" class="primary-btn">📚 View Saved Stories</button>

<div class="section-title">Favourite Character</div>
<div id="character">
  <span class="option active" onclick="select(this,'character')">🐉 Dragon</span>
  <span class="option" onclick="select(this,'character')">🦁 Lion</span>
  <span class="option" onclick="select(this,'character')">🦄 Unicorn</span>
</div>

<div class="section-title">Length</div>
<div id="length">
  <span class="option active" onclick="select(this,'length')">Short (2–3 mins)</span>
  <span class="option" onclick="select(this,'length')">Medium (5–6 mins)</span>
  <span class="option" onclick="select(this,'length')">Long (8–10 mins)</span>
</div>

<button id="generateBtn" class="primary-btn" onclick="generateStory()">Create Story</button>

<p id="loadingText" style="text-align:center; margin-top:10px;"></p>

</div>

<div id="storyCard" class="card hidden">
  <h2 id="storyTitle"></h2>
  <p id="storyText"></p>
</div>

</div>

<script>

let selections = {
  character: "Dragon",
  length: "Short"
};

function select(el, type) {
  const parent = el.parentElement;
  Array.from(parent.children).forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  selections[type] = el.innerText.split(" (")[0];
}

async function generateStory() {

  const btn = document.getElementById("generateBtn");

  if (btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "🌙 Creating your story...";

  try {

    const name = document.getElementById("name").value || "A child";
    const companion = document.getElementById("companion").value || "a friend";

    const response = await fetch("/api/story", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        companion,
        selections,
        length: selections.length   // ✅ FIXED
      })
    });

    const data = await response.json();
    console.log("API RESPONSE:", data); // ✅ DEBUG

    const story = data.story || "Story failed to generate.";

    const parts = story.split("\n\n");

    document.getElementById("storyTitle").innerText = parts[0];
    document.getElementById("storyText").innerText = parts.slice(1).join("\n\n");

    document.getElementById("storyCard").classList.remove("hidden");

  } catch (err) {
    alert("Error: " + (err.message || "Check console")); // ✅ BETTER ERROR
    console.error(err);
  }

  btn.disabled = false;
  btn.innerText = "Create Story";
}

</script>

</body>
</html>
