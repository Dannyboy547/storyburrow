<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StoryBurrow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  background: linear-gradient(180deg, #7b5cff, #b58cff);
  margin: 0;
  padding: 20px;
  text-align: center;
  color: white;
}
.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
  margin-top: 20px;
}
button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: purple;
  color: white;
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<img src="Logo.png.PNG" style="width:250px;">

<h2>Magical bedtime stories, made just for your child</h2>

<div class="card">
<input id="name" placeholder="Child's Name"><br><br>
<button onclick="generateStory()">Create Story</button>
</div>

<div class="card" id="storyCard" style="display:none;">
<h3 id="storyTitle"></h3>
<p id="storyText"></p>
</div>

<script>
async function generateStory() {
  const name = document.getElementById("name").value || "A child";

  const res = await fetch("/api/story", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name })
  });

  const data = await res.json();

  document.getElementById("storyTitle").innerText = "Your Story";
  document.getElementById("storyText").innerText = data.story;
  document.getElementById("storyCard").style.display = "block";
}
</script>

</body>
</html>
