<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StoryBurrow</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #7b5cff, #b58cff, #f3d1ff);
  margin: 0;
  padding: 0;
  color: #2d1f3f;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 15px;
  padding-top: 20px;
}

.subtitle {
  text-align: center;
  color: white;
  opacity: 0.9;
  margin-bottom: 20px;
  font-size: 15px;
}

.card {
  background: white;
  padding: 18px;
  border-radius: 18px;
  margin: 15px 0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin: 8px 0;
}

.primary-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #7b5cff, #d96fff);
  color: white;
  font-weight: bold;
  margin-top: 10px;
}

.option {
  display: inline-block;
  padding: 10px 14px;
  margin: 5px;
  border-radius: 20px;
  border: 2px solid #c9a7ff;
  cursor: pointer;
  font-size: 13px;
}

.option.active {
  background: linear-gradient(135deg, #7b5cff, #d96fff);
  color: white;
  border: none;
}

.section-title {
  margin-top: 15px;
  font-weight: bold;
}

.hidden { display: none; }

#storyText {
  white-space: pre-line;
  line-height: 1.7;
}

#storyTitle {
  font-size: 22px;
  margin-bottom: 10px;
  color: #2d1f3f;
}
</style>
</head>

<body>

<div class="container">

<div style="text-align:center;">
  <img src="Logo.png.PNG" 
  style="width:340px; max-width:92%; margin:15px 0; filter: drop-shadow(0 0 16px rgba(255,255,255,0.6));">
</div>

<p class="subtitle">Magical bedtime stories, made just for your child</p>

<div class="card">

<input id="name" placeholder="Child's Name">
<input id="companion" placeholder="Optional: Companion">

<button onclick="viewStories()" class="primary-btn">📚 View Saved Stories</button>

<div class="section-title">Favourite Character</div>
<div id="character">
  <span class="option active" onclick="select(this,'character')">🐉 Dragon</span>
  <span class="option" onclick="select(this,'character')">🦁 Lion</span>
  <span class="option" onclick="select(this,'character')">🦄 Unicorn</span>
</div>

<div class="section-title">Length</div>
<div id="length">
  <span class="option active" onclick="select(this,'length')">Short (2–3 mins)</span>
  <span class="option" onclick="select(this,'length')">Medium (5–6 mins)</span>
  <span class="option" onclick="select(this,'length')">Long (8–10 mins)</span>
</div>

<button id="generateBtn" class="primary-btn" onclick="generateStory()">Create Story</button>

<p id="loadingText" style="text-align:center; margin-top:10px;"></p>

</div>

<div id="storyCard" class="card hidden">
  <h2 id="storyTitle"></h2>
  <p id="storyText"></p>

  <button onclick="readStory()" class="primary-btn">🔊 Read Aloud</button>
  <button onclick="saveStory()" class="primary-btn">💾 Save Story</button>
  <button onclick="generateStory()" class="primary-btn">🔁 Try Another</button>
</div>

<div id="libraryCard" class="card hidden">
  <h3>📚 Saved Stories</h3>
  <div id="savedStoriesList"></div>
</div>

</div>

<script>

let selections = {
  character: "Dragon",
  world: "Enchanted Forest",
  mood: "Calm bedtime",
  type: "Night",
  length: "Short"
};

function select(el, type) {
  const parent = el.parentElement;
  Array.from(parent.children).forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  selections[type] = el.innerText.split(" (")[0];
}

function saveStory() {
  const title = document.getElementById("storyTitle").innerText;
  const text = document.getElementById("storyText").innerText;

  const story = { title, text };

  let saved = JSON.parse(localStorage.getItem("stories") || "[]");
  saved.push(story);

  localStorage.setItem("stories", JSON.stringify(saved));

  alert("Story saved!");
}

function viewStories() {
  let saved = JSON.parse(localStorage.getItem("stories") || "[]");

  const listDiv = document.getElementById("savedStoriesList");
  listDiv.innerHTML = "";

  if (saved.length === 0) {
    listDiv.innerHTML = "<p>No saved stories yet.</p>";
  } else {
    saved.forEach((story, index) => {
      const item = document.createElement("div");
      item.style.marginBottom = "12px";
      item.style.padding = "10px";
      item.style.borderRadius = "10px";
      item.style.background = "#f5f0ff";

      item.innerHTML = `
        <strong>${story.title}</strong><br><br>
        <button onclick="loadStory(${index})" class="primary-btn">📖 Read</button>
        <button onclick="deleteStory(${index})" class="primary-btn">🗑 Delete</button>
      `;

      listDiv.appendChild(item);
    });
  }

  document.getElementById("libraryCard").classList.remove("hidden");
}

function loadStory(index) {
  let saved = JSON.parse(localStorage.getItem("stories") || "[]");

  const story = saved[index];

  document.getElementById("storyTitle").innerText = story.title;
  document.getElementById("storyText").innerText = story.text;

  document.getElementById("storyCard").classList.remove("hidden");

  setTimeout(() => {
    document.getElementById("storyTitle").scrollIntoView({ behavior: "smooth" });
  }, 200);
}

function deleteStory(index) {
  let saved = JSON.parse(localStorage.getItem("stories") || "[]");

  saved.splice(index, 1);

  localStorage.setItem("stories", JSON.stringify(saved));

  viewStories();
}

function readStory() {
  const text = document.getElementById("storyText").innerText;

  const speech = new SpeechSynthesisUtterance(text);

  speech.rate = 0.75;
  speech.pitch = 1.1;

  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.name.includes("Google UK English Female") ||
    v.name.includes("Female") ||
    v.name.includes("Samantha")
  );

  if (preferred) speech.voice = preferred;

  speechSynthesis.speak(speech);
}

async function generateStory() {

  const btn = document.getElementById("generateBtn");

  if (btn.disabled) return;

  btn.disabled = true;
  btn.innerText = "🌙 Creating your story...";

  try {

    const name = document.getElementById("name").value || "A child";
    const companion = document.getElementById("companion").value || "a friend";

    const response = await fetch("/api/story", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        companion,
        selections,
        length: selections.length
      })
    });

    const data = await response.json();
    console.log("API RESPONSE:", data);

    const story = data.story || "Story failed to generate.";

    const parts = story.split("\n\n");

    document.getElementById("storyTitle").innerText = parts[0].replace(/[#*]/g, "");
    document.getElementById("storyText").innerText = parts.slice(1).join("\n\n");

    document.getElementById("storyCard").classList.remove("hidden");

    setTimeout(() => {
      document.getElementById("storyTitle").scrollIntoView({ behavior: "smooth" });
    }, 300);

  } catch (err) {
    alert("Error: " + (err.message || "Check console"));
    console.error(err);
  }

  btn.disabled = false;
  btn.innerText = "Create Story";
}

</script>

</body>
</html>
